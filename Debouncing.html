    <div class="container">
      <h2>Debounce Search</h2>
      <div class="info">Typing করলে delay (300ms) পরে search run হবে</div>

      <input id="search" type="text" placeholder="Search fruits..." />
      <ul id="results"></ul>
    </div>

    <script>
      // Debounce Function
      function debounce(func, delay) {
        let timeout;
        return function (...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), delay);
        };
      }

      const fruits = [
        "Apple",
        "Banana",
        "Mango",
        "Orange",
        "Pineapple",
        "Grapes",
        "Watermelon",
        "Strawberry",
      ];

      const searchInput = document.getElementById("search");
      const results = document.getElementById("results");

      function searchHandler(e) {
        const value = e.target.value.toLowerCase();

        const filtered = fruits.filter((fruit) =>
          fruit.toLowerCase().includes(value),
        );

        results.innerHTML = filtered.map((item) => `<li>${item}</li>`).join("");
      }

      // Apply Debounce
      searchInput.addEventListener("input", debounce(searchHandler, 300));
      //   searchInput.addEventListener("input", searchHandler);
    </script>
  </body>
